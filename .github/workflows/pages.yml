name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate runtime config
        env:
          API_KEY: ${{ secrets.API_KEY }}
          REFRESH_INTERVAL_MS: ${{ vars.REFRESH_INTERVAL_MS }}
          TILE_URL: ${{ vars.TILE_URL }}
          TILE_ATTRIBUTION: ${{ vars.TILE_ATTRIBUTION }}
          TILE_MAX_ZOOM: ${{ vars.TILE_MAX_ZOOM }}
          INITIAL_THEME: ${{ vars.INITIAL_THEME }}
        run: |
          mkdir -p data
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          def value(name: str, default: str) -> str:
              raw = os.environ.get(name, "").strip()
              return raw or default

          config = {
              "apiKey": value("API_KEY", ""),
              "refreshIntervalMs": int(value("REFRESH_INTERVAL_MS", "120000")),
              "tileUrl": value("TILE_URL", "https://tile.openstreetmap.org/{z}/{x}/{y}.png"),
              "tileAttribution": value(
                  "TILE_ATTRIBUTION",
                  '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
              ),
              "tileMaxZoom": int(value("TILE_MAX_ZOOM", "19")),
              "initialTheme": value("INITIAL_THEME", "light"),
          }

          Path("data/runtime-config.json").write_text(json.dumps(config, separators=(",", ":")))
          PY

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
